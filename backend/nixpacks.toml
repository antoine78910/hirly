[phases.setup]
# `chromium` is included as a Nix package (not `playwright install chromium`)
# because Nixpacks builds run in a sandboxed Nix environment without apt, so
# Playwright's own browser-download + `install-deps` (apt-based) doesn't work
# here. Nix's chromium package is self-contained with all shared libs already
# linked, and apply_agent/browser.py points Playwright at it directly via
# executable_path when present, falling back to Playwright's bundled browser
# resolution for local dev machines where `playwright install chromium` was
# run normally.
nixPkgs = ["python312", "chromium"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "python run_server.py"
