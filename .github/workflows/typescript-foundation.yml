name: Main CI and production release

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'production-release' || format('ci-{0}', github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}

jobs:
  bun-workspaces:
    name: Bun workspaces
    runs-on: ubuntu-latest
    environment: production
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hirly_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hirly_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # This is a connection template only. The hardened release verifier creates
      # and later drops one unique empty database per destructive PostgreSQL suite.
      G015_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hirly_test
      CONTRACTSPEC_NPM_TOKEN: ${{ secrets.CONTRACTSPEC_NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install release verification system dependencies
        run: sudo apt-get update && sudo apt-get install -y postgresql-client zsh
      - name: Install backend compatibility dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --disable-pip-version-check -r backend/requirements.txt
          .venv/bin/python -m pip install --disable-pip-version-check pytest==9.1.1
      - run: bun install --frozen-lockfile
      - name: Validate formatting, lint rules, and import organization
        run: bun run check:changed
      - name: Run G003 worker adversarial matrix
        run: bun run test:g003
      - name: Verify repository and isolated PostgreSQL release matrix
        run: >-
          bun run verify:job-supply-release --
          --profile repository
          --allow-disposable-database
          --expected-head "$(git rev-parse HEAD)"
          --output
          ".omx/verification/job-supply-release-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.json"

  legacy-frontend:
    name: Legacy frontend smoke build
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: frontend
    env:
      CONTRACTSPEC_NPM_TOKEN: ${{ secrets.CONTRACTSPEC_NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install runbook contract dependencies
        run: sudo apt-get update && sudo apt-get install -y zsh
      - run: npm ci --legacy-peer-deps
      - run: npm audit --omit=dev --audit-level=critical
      - run: npm run test -- --watchAll=false --runInBand
        env:
          CI: "true"
      - run: npm run build
        env:
          CI: "false"

  stack-policy:
    name: Stack policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Stage the checked revision range
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: git reset --soft "$BASE_SHA"
      - run: node scripts/check-stack-policy.mjs

  production-migrations:
    name: Production migration gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - bun-workspaces
      - legacy-frontend
      - stack-policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Require the production database credential
        run: test -n "$SUPABASE_DB_URL"
      - uses: supabase/setup-cli@v1
        with:
          version: 2.105.0
      - name: Preview pending production migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL" --dry-run
      - name: Apply pending production migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL" --yes

  deploy-railway:
    name: Deploy Railway backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - production-migrations
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
      RAILWAY_BACKEND_URL: ${{ vars.RAILWAY_BACKEND_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Require Railway release configuration
        run: |
          test -n "$RAILWAY_TOKEN"
          test -n "$RAILWAY_PROJECT_ID"
          test -n "$RAILWAY_SERVICE"
          test -n "$RAILWAY_BACKEND_URL"
      - name: Deploy the checked commit
        run: >-
          npx --yes @railway/cli@5.27.1 up
          --ci
          --project "$RAILWAY_PROJECT_ID"
          --environment production
          --service "$RAILWAY_SERVICE"
          --message "GitHub Actions ${GITHUB_SHA}"
      - name: Wait for the checked commit to become ready
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          for attempt in $(seq 1 60); do
            health_status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
              --max-time 10 "${RAILWAY_BACKEND_URL%/}/api/health" || true)"
            deployed_sha="$(curl --silent --fail --max-time 10 \
              "${RAILWAY_BACKEND_URL%/}/api/version" \
              | jq --raw-output '.git_sha // empty' || true)"

            if [ "$health_status" = "200" ] && [ "$deployed_sha" = "$EXPECTED_SHA" ]; then
              echo "Railway is healthy on ${EXPECTED_SHA}."
              exit 0
            fi

            echo "Attempt ${attempt}/60: health=${health_status:-unreachable} sha=${deployed_sha:-unknown}"
            sleep 10
          done

          echo "::error::Railway did not serve healthy commit ${EXPECTED_SHA} within 10 minutes."
          exit 1

  deploy-vercel:
    name: Promote Vercel after backend readiness
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - deploy-railway
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_FRONTEND_URL: ${{ vars.VERCEL_FRONTEND_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Require Vercel release configuration
        run: |
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
          test -n "$VERCEL_FRONTEND_URL"
      - name: Require Vercel production package token metadata
        run: |
          if ! npx --yes vercel@56.4.0 env ls production --token "$VERCEL_TOKEN" \
            | grep --quiet --fixed-strings 'CONTRACTSPEC_NPM_TOKEN'; then
            echo "::error::Vercel Production is missing CONTRACTSPEC_NPM_TOKEN metadata."
            exit 1
          fi
      - name: Create a staged production deployment
        id: deploy
        run: |
          deployment_url="$(
            npx --yes vercel@56.4.0 deploy \
              --prod \
              --skip-domain \
              --yes \
              --token "$VERCEL_TOKEN"
          )"
          test -n "$deployment_url"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
      - name: Verify the staged frontend
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: >-
          npx --yes vercel@56.4.0 curl /
          --deployment "$DEPLOYMENT_URL"
          --yes
          --token "$VERCEL_TOKEN"
          --
          --fail
          --show-error
          --silent
          --retry 5
          --retry-all-errors
      - name: Promote the verified frontend
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: >-
          npx --yes vercel@56.4.0 promote "$DEPLOYMENT_URL"
          --yes
          --timeout=5m
          --token "$VERCEL_TOKEN"
      - name: Verify the production frontend
        run: curl --fail --show-error --silent --retry 5 --retry-all-errors "${VERCEL_FRONTEND_URL%/}/" >/dev/null
