name: TypeScript foundation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  bun-workspaces:
    name: Bun workspaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run format
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build

  legacy-frontend:
    name: Legacy frontend smoke build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install --legacy-peer-deps
      - run: npm run build
        env:
          CI: "false"

  stack-policy:
    name: Stack policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Stage the checked revision range
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: git reset --soft "$BASE_SHA"
      - run: node scripts/check-stack-policy.mjs
