name: TypeScript foundation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  bun-workspaces:
    name: Bun workspaces
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hirly_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hirly_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      G002_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hirly_test
      G003_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hirly_test
      G004_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hirly_test
      G010_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hirly_test
      G011_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hirly_test
      JOB_INGESTION_LEDGER_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hirly_test
      G014_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hirly_test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: bun install --frozen-lockfile
      - run: bun run format
      - run: bun run lint
      - run: bun run typecheck
      - name: Run G003 worker adversarial matrix
        run: bun run test:g003
      - run: bun run test
      - run: bun run build
      - name: Verify G015 release contracts
        run: bun test tests/g015-release-readiness.test.ts

  legacy-frontend:
    name: Legacy frontend smoke build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build
        env:
          CI: "false"

  stack-policy:
    name: Stack policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Stage the checked revision range
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: git reset --soft "$BASE_SHA"
      - run: node scripts/check-stack-policy.mjs
